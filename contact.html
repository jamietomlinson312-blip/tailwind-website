<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link rel="stylesheet" href="../src/output.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <!-- Nav bar-->
    <header class="fixed max-w-screen top-0 left-0 right-0 z-50 bg-slate-800 p-1" >
        <nav class="p-1 flex justify-center sm:text-base sm:max-w-screen sm:justify-start">
            <div class="p-1 flex auto items-center justify-between">
                <a href="#email"><i class="bi-envelope-at" style="font-size:medium; color:antiquewhite; margin-right:10px;"></i></a>
                <a href="#linkedin"><i class="bi bi-linkedin" style="font-size:medium; color:antiquewhite;"></i></a>
            </div>
            <div class="flex auto max-w-screen font-Inter font-regular text-xl sm:text-base">
                <a class="text-olive-50 m-2 p-2 rounded-md shadow-xl/20
                sm:inline text-sm transition duration-300 ease-in-out hover:bg-slate-700" href="index.html">About</a>
                <a class="text-olive-50 m-2 p-2 rounded-md shadow-xl/20 
                sm:inline text-sm transition duration-300 ease-in-out hover:bg-slate-700" href="gallery.html">Gallery</a>
                <a class="text-olive-50 m-2 p-2 rounded-md shadow-xl/20 
                sm:inline text-sm transition duration-300 ease-in-out hover:bg-slate-700" href="contact.html">Contact</a>
            </div>
        </nav>
    </header>


    <section class="relative mt-20 h-screen font-Inter">
        <h1 class="mb-5 p-2 text-2xl">Contact Me</h1>
        <div class="bg-slate-200/50 rounded-lg shadow-lg">
            <div class="p-4 mx-auto max-w-1/2 flex gap-4 justify-left">
                <div class="w-32 flex-auto">
                    <form>
                        <label for="fname" class="p-2 text-xs font-bold">Full name</label><br>
                        <input type="text" id="fname" name="fname" value="John Smith" class="font-extralight text-gray-500 p-2 border-1 
                        border-gray-500"><br>
                    </form>
                </div>
                <div class="w-32 flex-auto">
                    <form>
                        <label for="email" class="p-2 text-xs font-bold">Email Address</label><br>
                        <input type="email" id="email" name="email" value="John_Smith@domain.com" class="max-w-9/10 font-extralight p-2 border-1 
                        text-gray-500 border-gray-500"><br>
                    </form>
                </div>
            </div>

            <div class="p-4 mx-auto max-w-1/2 flex gap-4 justify-left">
                <div class="w-32 flex-auto">
                    <form>
                        <label for="subject" class="p-2 text-xs font-bold">Subject</label><br>
                        <input type="text" id="subject" name="subject" value="Info Request" class="w-full font-extralight text-gray-500 p-2 
                        border-1 border-gray-500"><br>
                    </form>
                </div>
            </div>

            <div class="p-4 mx-auto max-w-1/2 gap-4 justify-left">
                <div class="w-full flex-auto">
                    <form>
                        <label for="message" class="p-2 text-xs font-bold">Message</label><br>
                        <textarea id="message" name="message" rows="5" value="Message Content" class="w-full font-extralight text-gray-500 p-2
                        border-1 border-gray-500"></textarea><br>
                    </form>
                </div>
                <br>
                <a href="#submit" class="mt-10 mb-10 p-2 bg-blue-600 text-gray-50 font-bold rounded-lg border-1 
                transition duration-300 ease-in-out hover:-translate-y-1 hover:scale-110 hover:bg-violet-600">
                Submit</a>
            </div>
            
        </div>
    </section>
   
    <!-- Footer -->
    <footer class="m-0 p-2 bg-slate-900 p-1 max-w-screen font-Inter" >
        <nav class="p-1 flex justify-left">
            <a class="text-olive-50 underline text-xs m-1 p-0.5 hover:text-slate-700" href="index.html">About</a>
            <a class="text-olive-50 underline text-xs m-1 p-0.5 hover:text-slate-700" href="gallery.html">Gallery</a>
            <a class="text-olive-50 underline text-xs m-1 p-0.5 hover:text-slate-700" href="contact.html">Contact</a>
        </nav>
        <div class="flex flex-col p-2">
            <p class="text-olive-50 text-xs">&copy; JT ltd.</p>
            <p class="text-olive-50 text-xs">44 Address Road <br>
                LivingPlace<br>
                4444
            </p>
            <p class="text-olive-50 text-xs">brought to you by TailwindCSS</p>
        </div>
    </footer>
